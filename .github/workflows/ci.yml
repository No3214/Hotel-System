name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== Backend Tests ====================
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with flake8
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=200 --statistics --exit-zero
        continue-on-error: true

      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: kozbeyli_test
          JWT_SECRET: test-secret-key-for-ci
          ENVIRONMENT: test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || true

  # ==================== Frontend Build ====================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile 2>/dev/null || yarn install

      - name: Lint
        run: |
          cd frontend
          npx eslint src/ --ext .js,.jsx --max-warnings=50 || true
        continue-on-error: true

      - name: Build
        env:
          REACT_APP_BACKEND_URL: ""
          CI: false
        run: |
          cd frontend
          yarn build

  # ==================== Docker Build ====================
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t kozbeyli-backend ./backend

      - name: Build frontend image
        run: docker build -t kozbeyli-frontend ./frontend --build-arg REACT_APP_BACKEND_URL=""
